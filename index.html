<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>লগইন</title>
    <!-- PWA Manifest Link যুক্ত করা হলো -->
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- চোখ আইকনের জন্য Font Awesome সিডিএন যুক্ত করা হলো -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Hind_Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Hind Siliguri', sans-serif; }</style>
</head>
<body class="bg-slate-950 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white w-full max-w-sm p-8 rounded-3xl shadow-[0_20px_50px_rgba(0,0,0,0.3)]">
        
        <div id="loginSection">
            <h2 class="text-2xl font-bold mb-1 text-slate-800">স্বাগতম! 👋</h2>
            <p class="text-slate-400 text-sm mb-6">আপনার অ্যাকাউন্টে লগইন করুন</p>
            <form id="loginForm" class="space-y-4">
                <div>
                    <input type="email" id="lEmail" placeholder="ইমেইল অ্যাড্রেস" class="w-full px-4 py-3 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:border-indigo-500" required>
                </div>
                
                <!-- পাসওয়ার্ড এবং চোখ আইকন সেকশন -->
                <div class="relative">
                    <input type="password" id="lPass" placeholder="পাসওয়ার্ড" class="w-full px-4 pr-12 py-3 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:border-indigo-500" required>
                    <button type="button" onclick="togglePasswordVisibility()" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-indigo-600 focus:outline-none text-sm">
                        <i id="passwordToggleIcon" class="fa-solid fa-eye-slash"></i>
                    </button>
                </div>

                <button type="submit" id="loginBtn" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-2xl hover:bg-indigo-700 transition">লগইন করুন</button>
            </form>
        </div>

    </div>

    <script type="module">
        import { auth, db } from "./firebase-config.js";
        import { signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // PWA সার্ভিস ওয়ার্কার রেজিস্ট্রেশন লজিক
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker Registered!', reg))
                    .catch(err => console.error('Service Worker Registration Failed!', err));
            });
        }

        // পাসওয়ার্ড দেখানো এবং লুকানোর গ্লোবাল ফাংশন
        window.togglePasswordVisibility = () => {
            const passwordInput = document.getElementById('lPass');
            const toggleIcon = document.getElementById('passwordToggleIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            }
        };

        // লগইন লজিক
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('lEmail').value.trim();
            const password = document.getElementById('lPass').value;
            const btn = document.getElementById('loginBtn');
            
            btn.disabled = true;
            btn.innerText = "লগইন হচ্ছে...";
            
            try {
                // ১. ফায়ারবেস অথেন্টিকেশন চেক
                const cred = await signInWithEmailAndPassword(auth, email, password);
                const user = cred.user;
                
                // ২. ফায়ারস্টোর ডাটাবেজ ভেরিফিকেশন
                try {
                    const userDoc = await getDoc(doc(db, "users", user.uid));
                    
                    if (userDoc.exists()) {
                        const userData = userDoc.data();
                        
                        // রোল ও স্ট্যাটাস অনুযায়ী রিডাইরেক্ট করা
                        if (userData.role === 'admin') {
                            window.location.href = 'admin.html';
                        } else if (userData.status === 'approved') {
                            window.location.href = 'customer.html';
                        } else {
                            await signOut(auth);
                            alert("আপনার অ্যাকাউন্টটি এখনও অনুমোদিত হয়নি। অনুগ্রহ করে অ্যাডমিনের অনুমোদনের জন্য অপেক্ষা করুন।");
                            btn.disabled = false;
                            btn.innerText = "লগইন করুন";
                        }
                    } else {
                        // যদি ফায়ারস্টোরে ইউজার ডকুমেন্ট না থাকে, তবে সরাসরি admin.html-এ যাবে
                        window.location.href = 'admin.html';
                    }
                } catch (firestoreErr) {
                    // ফায়ারস্টোর রিড করতে কোনো এরর হলে সরাসরি admin.html-এ যাবে
                    window.location.href = 'admin.html';
                }

            } catch (err) { 
                btn.disabled = false;
                btn.innerText = "লগইন করুন";
                if (err.code === 'auth/invalid-credential' || err.code === 'auth/user-not-found' || err.code === 'auth/wrong-password') {
                    alert("ভুল ইমেইল অথবা পাসওয়ার্ড দিয়েছেন। আবার চেষ্টা করুন।");
                } else {
                    alert("লগইন ব্যর্থ: " + err.message); 
                }
            }
        });
    </script>
</body>
</html>
